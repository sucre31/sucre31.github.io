<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MadHeaven WebGL</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    /* キャンバスを画面いっぱいに、かつスマホでも無理のないように */
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { width: 100vw; height: 100vh; display: block; }
  </style>
</head>
<body>
  <canvas id="unity-canvas"></canvas>

  <script src="Build/MadHeaven.loader.js"></script>
  <script>
    const firebaseConfig = { /* ...略... */ };
    firebase.initializeApp(firebaseConfig);

    // Unityの起動設定
    var canvas = document.querySelector("#unity-canvas");
    var config = {
      dataUrl: "Build/MadHeaven.data",
      frameworkUrl: "Build/MadHeaven.framework.js",
      codeUrl: "Build/MadHeaven.wasm",
      // メモリ節約のための設定（もしBuild設定で有効にしていれば）
      devicePixelRatio: Math.min(window.devicePixelRatio, 2), 
    };

    createUnityInstance(canvas, config, (progress) => {
        // 進捗管理を入れるとクラッシュしにくくなることがあります
    }).then((unityInstance) => {
      console.log("Unity Loaded");
    }).catch((message) => {
      alert(message); // エラー内容をスマホでも見えるようにする
    });
  </script>

</html>
