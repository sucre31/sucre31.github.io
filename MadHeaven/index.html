<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MadHeaven WebGL</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
    }

    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    /* ローディングUI */
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-family: sans-serif;
      text-align: center;
    }

    #progress-bar {
      width: 200px;
      height: 10px;
      background: #333;
      margin-top: 10px;
    }

    #progress-fill {
      width: 0%;
      height: 100%;
      background: #0f0;
    }
  </style>
</head>

<body>
  <canvas id="unity-canvas"></canvas>

  <!-- ローディング表示 -->
  <div id="loading">
    <div>Loading...</div>
    <div id="progress-text">0%</div>
    <div id="progress-bar">
      <div id="progress-fill"></div>
    </div>
  </div>

  <!-- Unity Loader -->
  <script src="Build/MadHeaven.loader.js"></script>

  <script>
    // Firebase初期化
    const firebaseConfig = {
      apiKey: "AIzaSyDI5aKExC5eWG8vDXwnt9aojBY-9V8_eZg",
      authDomain: "madheaven-bd5b7.firebaseapp.com",
      databaseURL: "https://madheaven-bd5b7-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "madheaven-bd5b7",
      storageBucket: "madheaven-bd5b7.firebasestorage.app",
      messagingSenderId: "500243194654",
      appId: "1:500243194654:web:cebfdec5df546808a95f0f"
    };
    firebase.initializeApp(firebaseConfig);

    const canvas = document.querySelector("#unity-canvas");
    const progressText = document.getElementById("progress-text");
    const progressFill = document.getElementById("progress-fill");
    const loadingDiv = document.getElementById("loading");

    const config = {
      dataUrl: "Build/MadHeaven.data",
      frameworkUrl: "Build/MadHeaven.framework.js",
      codeUrl: "Build/MadHeaven.wasm",
      devicePixelRatio: Math.min(window.devicePixelRatio, 2),
    };

    createUnityInstance(canvas, config, (progress) => {
      const percent = Math.floor(progress * 100);
      progressText.textContent = percent + "%";
      progressFill.style.width = percent + "%";
    })
    .then((unityInstance) => {
      console.log("Unity Loaded");
      loadingDiv.style.display = "none";
    })
    .catch((message) => {
      console.error(message);
      alert("エラー:\n" + message);
    });
  </script>
</body>
</html>
